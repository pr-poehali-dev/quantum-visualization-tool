<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="seal-ink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0d488" />
      <stop offset="55%" stop-color="#e6c766" />
      <stop offset="100%" stop-color="#a8842f" />
    </linearGradient>
    <filter id="seal-rough" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.8" />
    </filter>
  </defs>

  <rect width="100" height="100" rx="12" fill="#1c1712" />

  <g filter="url(#seal-rough)" stroke="url(#seal-ink)" fill="url(#seal-ink)">
    <circle cx="50" cy="50" r="47" stroke-width="3.4" fill="none" />
    <circle cx="50" cy="50" r="42.5" stroke-width="1.4" fill="none" opacity="0.85" />
    <circle cx="50" cy="50" r="33" stroke-width="1.2" fill="none" opacity="0.6" />

    <path id="seal-top" d="M 22 50 A 28 28 0 0 1 78 50" fill="none" stroke="none" />
    <path id="seal-bottom" d="M 78 50 A 28 28 0 0 1 22 50" fill="none" stroke="none" />
    <text font-family="Georgia, 'Times New Roman', serif" font-size="6.5" letter-spacing="3" stroke="none" font-weight="600">
      <textPath href="#seal-top" startOffset="50%" text-anchor="middle">★ РУССКИЙ ★</textPath>
    </text>
    <text font-family="Georgia, 'Times New Roman', serif" font-size="6.5" letter-spacing="3" stroke="none" font-weight="600">
      <textPath href="#seal-bottom" startOffset="50%" text-anchor="middle">МЕБЕЛЬ ИЗ ДУБА</textPath>
    </text>

    <text x="50" y="61" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="34" font-weight="700" stroke="none" letter-spacing="2">РС</text>
  </g>
</svg>
